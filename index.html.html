<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blanca — Quintessential Luxury</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #050C1F;
    --navy2: #0B1530;
    --navy3: #111D3A;
    --blue-glow: rgba(50, 100, 220, 0.18);
    --blue-accent: #2D5BE3;
    --blue-light: #4A80FF;
    --white: #F0F4FF;
    --muted: rgba(200, 215, 255, 0.45);
    --border: rgba(60, 100, 255, 0.15);
  }

  html, body {
    min-height: 100vh;
    background: var(--navy);
    color: var(--white);
    font-family: 'Jost', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Layered background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(45, 91, 227, 0.25) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(30, 60, 180, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 10% 60%, rgba(20, 50, 160, 0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle star/noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(rgba(100, 150, 255, 0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 430px;
    padding: 56px 24px 72px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.9s cubic-bezier(0.2, 0, 0, 1) both;
  }

  .logo-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 22px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(74,128,255,0.6), rgba(45,91,227,0.1), rgba(74,128,255,0.4));
    animation: rotateBorder 6s linear infinite;
  }

  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(74, 128, 255, 0.12);
  }

  @keyframes rotateBorder {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .logo-img {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 40px rgba(45, 91, 227, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 8px;
  }

  .brand-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    color: var(--blue-light);
    letter-spacing: 1px;
    margin-bottom: 22px;
    opacity: 0.85;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .orn-line {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,128,255,0.5));
  }

  .orn-line:last-child {
    background: linear-gradient(90deg, rgba(74,128,255,0.5), transparent);
  }

  .orn-diamond {
    width: 5px;
    height: 5px;
    background: var(--blue-light);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  /* Links */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 17px 22px;
    background: rgba(10, 20, 60, 0.5);
    border: 1px solid var(--border);
    border-radius: 3px;
    text-decoration: none;
    color: var(--white);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(8px);
    transition: border-color 0.35s, transform 0.25s, box-shadow 0.35s;
    animation: fadeUp 0.6s cubic-bezier(0.2, 0, 0, 1) both;
  }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(45, 91, 227, 0.08), transparent 60%);
    opacity: 0;
    transition: opacity 0.35s;
  }

  .link-item::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--blue-accent), var(--blue-light));
    transform: scaleY(0);
    transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
    transform-origin: bottom;
  }

  .link-item:hover {
    border-color: rgba(74, 128, 255, 0.4);
    transform: translateX(5px);
    box-shadow: -4px 0 20px rgba(45, 91, 227, 0.15), 0 4px 20px rgba(0,0,0,0.4);
  }

  .link-item:hover::before { opacity: 1; }
  .link-item:hover::after { transform: scaleY(1); }

  .link-item:nth-child(1) { animation-delay: 0.12s; }
  .link-item:nth-child(2) { animation-delay: 0.22s; }
  .link-item:nth-child(3) { animation-delay: 0.32s; }
  .link-item:nth-child(4) { animation-delay: 0.42s; }
  .link-item:nth-child(5) { animation-delay: 0.52s; }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(74, 128, 255, 0.2);
    background: rgba(45, 91, 227, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.3s, background 0.3s;
  }

  .link-item:hover .link-icon {
    border-color: rgba(74, 128, 255, 0.5);
    background: rgba(45, 91, 227, 0.2);
  }

  .link-icon svg {
    width: 17px;
    height: 17px;
    fill: var(--blue-light);
  }

  .link-text { flex: 1; }

  .link-platform {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue-light);
    font-weight: 500;
    margin-bottom: 3px;
    opacity: 0.8;
  }

  .link-handle {
    font-size: 14px;
    font-weight: 300;
    color: rgba(200, 215, 255, 0.65);
    letter-spacing: 0.3px;
  }

  .link-arrow {
    color: rgba(74, 128, 255, 0.6);
    font-size: 18px;
    font-weight: 200;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .link-item:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 52px;
    animation: fadeUp 0.7s 0.7s cubic-bezier(0.2, 0, 0, 1) both;
  }

  .footer-text {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(100, 140, 255, 0.3);
  }

  /* Keyframes */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
